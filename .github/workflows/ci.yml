name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-lint-sim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install wasm toolchain (clang + lld/wasm-ld)
        run: sudo apt-get update && sudo apt-get install -y clang lld

      - name: Build CLI
        run: cargo build --release

      - name: Clippy (blocking)
        run: cargo clippy --release -- -D warnings

      - name: Unit tests
        run: cargo test --release

      - name: Build all examples (compile -> clean -> lint)
        run: |
          for f in examples/*.c; do
            echo "== $f =="
            ./target/release/xahc build "$f" -o "/tmp/$(basename "${f%.c}").wasm"
          done

      - name: Test suites (declarative, sim-based)
        run: |
          ./target/release/xahc test examples/firewall.test.toml
          ./target/release/xahc test examples/emit_payment.test.toml

      - name: install-tx HookOn regression (fire-on-Payment)
        run: |
          HO=$(./target/release/xahc install-tx /tmp/firewall.wasm \
                 --account rHb9CJAWyB4rj91VRWn96DkukG4bwdtyTh --on Payment 2>/dev/null \
               | grep '"HookOn"' | grep -oE '[A-F0-9]{64}' | head -1)
          echo "HookOn(Payment)=$HO"
          [ "$HO" = "FFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFFBFFFFE" ] \
            || { echo "HookOn mismatch — encoder regression"; exit 1; }

      - name: Setup Node (for emit codec verification)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify emit builder against Xahau binary codec (round-trip)
        run: |
          set -e
          ./target/release/xahc build examples/emit_payment.c -o /tmp/emit.wasm
          HEX=$(./target/release/xahc sim /tmp/emit.wasm --tt 0 --drops 1000000 \
            | grep -i 'emit\[0\]' | sed -E 's/.*: *//' | tr -d '[:space:]')
          echo "emit blob hex: $HEX"
          [ -n "$HEX" ] || { echo "no emit blob produced by sim"; exit 1; }
          cd scripts && npm ci && node verify-emit.mjs "$HEX"
