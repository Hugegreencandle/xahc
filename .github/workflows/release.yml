name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: xahc-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            name: xahc-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p xahc-cli

      - name: Package
        run: |
          bin="target/${{ matrix.target }}/release/xahc"
          tar -czf "${{ matrix.name }}.tar.gz" -C "$(dirname "$bin")" xahc
          shasum -a 256 "${{ matrix.name }}.tar.gz" > "${{ matrix.name }}.tar.gz.sha256"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.name }}.tar.gz
            ${{ matrix.name }}.tar.gz.sha256
          body: |
            xahc ${{ github.ref_name }} — Xahau Hooks, Checked.

            Authoring/compile toolchain for C Hooks (pairs with xahau-mcp).

            **Install (macOS arm64 / Linux x86_64):**
            ```sh
            tar -xzf xahc-<platform>.tar.gz && sudo mv xahc /usr/local/bin/
            ```
            Compiling hooks also needs a wasm-capable LLVM (`brew install llvm lld`,
            or `apt install clang lld`). See the README.

            Pre-alpha. Not audited — confirm financial hooks on testnet before mainnet.
